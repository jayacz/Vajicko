<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥚Vajíčko!🥚</title>
    
    <!-- Nastavení pro iPhone aplikaci -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Opravená ikona pro plochu iPhonu (Zelená s vajíčkem) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234caf50'/%3E%3Ctext y='75' x='10' font-size='80'%3E🥚%3C/text%3E%3C/svg%3E">
    
    <!-- Ikona pro prohlížeč -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🥚%3C/text%3E%3C/svg%3E">

    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #4caf50; 
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: manipulation;
        }

        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 5px; font-size: 24px; text-align: center; }
        #status { color: #f1f8e9; margin-bottom: 30px; font-weight: bold; height: 24px; text-align: center; font-size: 18px; }

        .game-container {
            position: relative; width: 100%; max-width: 400px; height: 220px;
            display: flex; justify-content: space-around; align-items: flex-end;
        }

        .bunny-wrapper {
            position: absolute; width: 100px; transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        .bunny { font-size: 80px; z-index: 2; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bunny.jump { transform: translateY(-110px); }

        .egg-hidden {
            font-size: 45px; position: absolute; bottom: 10px; z-index: 1; display: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .btn {
            margin-top: 50px; padding: 15px 40px;
            background: #ffeb3b; color: #333; border: none;
            border-radius: 30px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }

        #win-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        #gift-img {
            width: 85%; max-width: 320px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin: 20px 0;
            border: 6px solid #ffeb3b;
        }
    </style>
</head>
<body>

    <h1>Kde se schovalo vajíčko? 🥚</h1>
    <div id="status">Klepni na Start!</div>

    <div class="game-container">
        <div class="bunny-wrapper" id="bunny-0" style="left: 5%;" onclick="selectBunny(0)">
            <div class="bunny" id="visual-0">🐰</div>
            <div class="egg-hidden" id="egg-0">🥚</div>
        </div>
        <div class="bunny-wrapper" id="bunny-1" style="left: 37%;" onclick="selectBunny(1)">
            <div class="bunny" id="visual-1">🐰</div>
            <div class="egg-hidden" id="egg-1">🥚</div>
        </div>
        <div class="bunny-wrapper" id="bunny-2" style="left: 69%;" onclick="selectBunny(2)">
            <div class="bunny" id="visual-2">🐰</div>
            <div class="egg-hidden" id="egg-2">🥚</div>
        </div>
    </div>

    <button class="btn" id="start-btn" onclick="startGame()">Start!</button>

    <div id="win-screen">
        <h1 style="color: #4caf50;">MÁŠ HO! 🥚</h1>
        <img id="gift-img" src="" alt="Dárek">
        <p style="font-size: 20px; font-weight: bold; color: #333; padding: 0 20px; text-align: center;">
            Tady je vajíčko co navibecodilo tvoje AI Jajíčko ❣️
        </p>
        <button class="btn" onclick="window.location.reload()">Hrát znovu</button>
    </div>

    <script>
        let eggPosition = 1; 
        let isShuffling = false;
        let canPick = false;
        const positions = ["5%", "37%", "69%"];
        let currentMapping = [0, 1, 2];

        function startGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').innerText = "Sleduj vajíčko...";
            
            eggPosition = Math.floor(Math.random() * 3);
            
            // Schovat vajíčka u všech
            for(let i=0; i<3; i++) {
                document.getElementById('egg-'+i).style.display = 'none';
                document.getElementById('visual-'+i).classList.remove('jump');
            }

            const targetEgg = document.getElementById('egg-' + eggPosition);
            const targetBunny = document.getElementById('visual-' + eggPosition);
            
            // Ukázka vajíčka
            targetBunny.classList.add('jump');
            targetEgg.style.display = 'block';
            
            setTimeout(() => {
                targetBunny.classList.remove('jump');
                setTimeout(() => {
                    targetEgg.style.display = 'none';
                    startShuffle();
                }, 500);
            }, 1200);
        }

        function startShuffle() {
            isShuffling = true;
            canPick = false;
            document.getElementById('status').innerText = "Míchám...";
            let count = 0;
            const maxShuffles = 10;

            const interval = setInterval(() => {
                currentMapping.sort(() => Math.random() - 0.5);
                currentMapping.forEach((idx, pos) => {
                    document.getElementById('bunny-' + idx).style.left = positions[pos];
                });

                count++;
                if (count >= maxShuffles) {
                    clearInterval(interval);
                    isShuffling = false;
                    canPick = true;
                    document.getElementById('status').innerText = "Kde je?";
                }
            }, 450);
        }

        function selectBunny(idx) {
            if (!canPick || isShuffling) return;
            canPick = false;
            
            const visual = document.getElementById('visual-' + idx);
            visual.classList.add('jump');

            if (idx === eggPosition) {
                // Trefa
                document.getElementById('egg-' + idx).style.display = 'block';
                document.getElementById('status').innerText = "ANO! 🥚";
                document.getElementById('gift-img').src = "vajicko.jpeg";
                setTimeout(() => {
                    document.getElementById('win-screen').style.display = 'flex';
                }, 1000);
            } else {
                // Chyba
                document.getElementById('status').innerText = "Vedle! Bylo tady...";
                const correctVisual = document.getElementById('visual-' + eggPosition);
                const correctEgg = document.getElementById('egg-' + eggPosition);
                
                setTimeout(() => {
                    correctVisual.classList.add('jump');
                    correctEgg.style.display = 'block';
                    
                    // Místo reloadu jen schováme a mícháme znovu
                    setTimeout(() => {
                        visual.classList.remove('jump');
                        correctVisual.classList.remove('jump');
                        correctEgg.style.display = 'none';
                        startGame(); // Automaticky začne znovu
                    }, 1500);
                }, 500);
            }
        }
    </script>
</body>
</html>
