<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥚Vajíčko!🥚</title>

    <!-- Nastavení pro iPhone aplikaci -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Opravená ikona pro plochu iPhonu (Zelená s vajíčkem) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234caf50'/%3E%3Ctext y='75' x='10' font-size='80'%3E🥚%3C/text%3E%3C/svg%3E">

    <!-- Ikona pro prohlížeč -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🥚%3C/text%3E%3C/svg%3E">

    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #4caf50;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: manipulation;
        }

        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 5px; font-size: 24px; text-align: center; }

        #status { color: #f1f8e9; margin-bottom: 30px; font-weight: bold; height: 24px; text-align: center; font-size: 18px; }

        .game-container {
            position: relative; width: 100%; max-width: 400px; height: 220px;
            display: flex; justify-content: space-around; align-items: flex-end;
        }

        .bunny-wrapper {
            position: absolute; width: 100px; transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        .bunny { font-size: 80px; z-index: 2; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bunny.jump { transform: translateY(-110px); }

        .egg-hidden {
            font-size: 45px; position: absolute; bottom: 10px; z-index: 1; display: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .btn {
            margin-top: 50px; padding: 15px 40px;
            background: #ffeb3b; color: #333; border: none;
            border-radius: 30px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }

        #win-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        #win-screen h1 { color: #4caf50; }

        #win-screen p {
            font-size: 20px; font-weight: bold; color: #333;
            padding: 0 20px; text-align: center;
        }

        #gift-img {
            width: 85%; max-width: 320px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin: 20px 0;
            border: 6px solid #ffeb3b;
        }
    </style>
</head>
<body>

    <h1>Kde se schovalo vajíčko? 🥚</h1>
    <div id="status">Klepni na Start!</div>

    <div class="game-container" id="game-container"></div>

    <button class="btn" id="start-btn">Start!</button>

    <div id="win-screen">
        <h1>MÁŠ HO! 🥚</h1>
        <img id="gift-img" src="" alt="Dárek">
        <p>Tady je vajíčko co navibecodilo tvoje AI Jajíčko ❣️</p>
        <button class="btn" id="replay-btn">Hrát znovu</button>
    </div>

    <script>
        // --- Konštanty ---
        const BUNNY_COUNT = 3;
        const POSITIONS = ["5%", "37%", "69%"];
        const SHUFFLE_COUNT = 10;
        const SHUFFLE_INTERVAL_MS = 450;
        const SHOW_EGG_MS = 1200;
        const HIDE_EGG_MS = 500;
        const WIN_DELAY_MS = 1000;
        const WRONG_REVEAL_MS = 500;
        const WRONG_RESTART_MS = 1500;

        // --- Stav hry ---
        let eggPosition = 1;
        let gameState = "idle"; // "idle" | "showing" | "shuffling" | "picking"
        let currentMapping = Array.from({ length: BUNNY_COUNT }, (_, i) => i);

        // --- Cache DOM elementov ---
        const dom = {
            status: document.getElementById("status"),
            startBtn: document.getElementById("start-btn"),
            winScreen: document.getElementById("win-screen"),
            giftImg: document.getElementById("gift-img"),
            replayBtn: document.getElementById("replay-btn"),
            container: document.getElementById("game-container"),
            bunnies: [],   // { wrapper, visual, egg }
        };

        // --- Generovanie zajačikov ---
        for (let i = 0; i < BUNNY_COUNT; i++) {
            const wrapper = document.createElement("div");
            wrapper.className = "bunny-wrapper";
            wrapper.id = "bunny-" + i;
            wrapper.style.left = POSITIONS[i];
            wrapper.addEventListener("click", () => selectBunny(i));

            const visual = document.createElement("div");
            visual.className = "bunny";
            visual.textContent = "🐰";

            const egg = document.createElement("div");
            egg.className = "egg-hidden";
            egg.textContent = "🥚";

            wrapper.appendChild(visual);
            wrapper.appendChild(egg);
            dom.container.appendChild(wrapper);

            dom.bunnies.push({ wrapper, visual, egg });
        }

        // --- Event listenery ---
        dom.startBtn.addEventListener("click", startGame);
        dom.replayBtn.addEventListener("click", () => window.location.reload());

        // --- Fisher-Yates shuffle (korektný, bez zaujatosti) ---
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // --- Herná logika ---
        function startGame() {
            dom.startBtn.style.display = "none";
            dom.status.innerText = "Sleduj vajíčko...";
            gameState = "showing";

            eggPosition = Math.floor(Math.random() * BUNNY_COUNT);

            // Schovat vajíčka u všech
            for (const b of dom.bunnies) {
                b.egg.style.display = "none";
                b.visual.classList.remove("jump");
            }

            const target = dom.bunnies[eggPosition];

            // Ukázka vajíčka
            target.visual.classList.add("jump");
            target.egg.style.display = "block";

            setTimeout(() => {
                target.visual.classList.remove("jump");
                setTimeout(() => {
                    target.egg.style.display = "none";
                    startShuffle();
                }, HIDE_EGG_MS);
            }, SHOW_EGG_MS);
        }

        function startShuffle() {
            gameState = "shuffling";
            dom.status.innerText = "Míchám...";
            let count = 0;

            const interval = setInterval(() => {
                shuffleArray(currentMapping);
                currentMapping.forEach((idx, pos) => {
                    dom.bunnies[idx].wrapper.style.left = POSITIONS[pos];
                });

                count++;
                if (count >= SHUFFLE_COUNT) {
                    clearInterval(interval);
                    gameState = "picking";
                    dom.status.innerText = "Kde je?";
                }
            }, SHUFFLE_INTERVAL_MS);
        }

        function selectBunny(idx) {
            if (gameState !== "picking") return;
            gameState = "idle";

            const selected = dom.bunnies[idx];
            selected.visual.classList.add("jump");

            if (idx === eggPosition) {
                // Trefa
                selected.egg.style.display = "block";
                dom.status.innerText = "ANO! 🥚";
                dom.giftImg.src = "vajicko.jpeg";
                setTimeout(() => {
                    dom.winScreen.style.display = "flex";
                }, WIN_DELAY_MS);
            } else {
                // Chyba
                dom.status.innerText = "Vedle! Bylo tady...";
                const correct = dom.bunnies[eggPosition];

                setTimeout(() => {
                    correct.visual.classList.add("jump");
                    correct.egg.style.display = "block";

                    setTimeout(() => {
                        selected.visual.classList.remove("jump");
                        correct.visual.classList.remove("jump");
                        correct.egg.style.display = "none";
                        startGame();
                    }, WRONG_RESTART_MS);
                }, WRONG_REVEAL_MS);
            }
        }
    </script>
</body>
</html>
